<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Billiards Club Manager</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 10px; color: #333; }
        h1 { text-align: center; color: #2c3e50; font-size: 1.5em; margin-top: 10px; }
        
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; max-width: 1200px; margin: 0 auto; }
        .table-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; }
        .snooker-card { border-top: 6px solid #e74c3c; } 
        .pool-card { border-top: 6px solid #3498db; } 
        
        .table-title { font-size: 1.4em; font-weight: bold; margin-bottom: 5px; }
        .rate-info { color: #7f8c8d; font-size: 0.9em; margin-bottom: 15px; }
        
        .time-inputs { display: flex; flex-direction: column; gap: 12px; margin-bottom: 15px; }
        .input-row { display: flex; align-items: center; justify-content: space-between; background-color: #f8f9fa; padding: 10px; border-radius: 8px; border: 1px solid #e9ecef; }
        .input-row label { font-weight: bold; color: #555; font-size: 0.9em; }
        input[type="time"], input[type="text"] { padding: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 1.1em; font-family: inherit; background-color: white; box-sizing: border-box; }
        input[type="time"] { width: 130px; }
        
        .calc-btn { width: 100%; padding: 15px; font-size: 1.1em; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; background-color: #2ecc71; transition: 0.2s; user-select: none; -webkit-tap-highlight-color: transparent; }
        .calc-btn:active { background-color: #27ae60; } 
        
        .action-btns { display: flex; gap: 5px; }
        .edit-btn, .delete-btn { border: none; border-radius: 6px; padding: 8px 12px; font-size: 1em; cursor: pointer; font-weight: bold; }
        .edit-btn { background-color: #e8f4f8; color: #3498db; border: 1px solid #b3e0ff; }
        .edit-btn:active { background-color: #b3e0ff; }
        .delete-btn { background-color: #ffdddd; color: #d32f2f; border: 1px solid #ffb3b3; }
        .delete-btn:active { background-color: #ffb3b3; }

        .history-section { max-width: 1200px; margin: 30px auto 20px; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .history-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #f0f2f5; }
        .history-header h2 { margin: 0; font-size: 1.2em; }
        
        .full-date-text { color: #3498db; font-weight: bold; }
        .date-picker-container { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        input[type="date"] { padding: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 1em; font-family: inherit; }
        
        .export-btn { background-color: #3498db; color: white; border: none; padding: 10px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.9em; }
        .export-btn:active { background-color: #2980b9; }

        .daily-total { font-size: 1.2em; font-weight: bold; color: #27ae60; background: #e8f8f5; padding: 8px 12px; border-radius: 8px; }
        
        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid #ddd; font-size: 0.9em; vertical-align: middle; }
        th { background-color: #f8f9fa; white-space: nowrap; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 20px; border-radius: 12px; width: 90%; max-width: 350px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .modal-content h3 { margin-top: 0; color: #2c3e50; text-align: center; }
        .modal-group { margin-bottom: 15px; }
        .modal-group label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; font-size: 0.9em; }
        .modal-group input { width: 100%; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btn { flex: 1; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; font-size: 1em; }
        .save-btn { background-color: #2ecc71; }
        .save-btn:active { background-color: #27ae60; }
        .cancel-btn { background-color: #95a5a6; }
        .cancel-btn:active { background-color: #7f8c8d; }
        
        .cloud-status { text-align: center; font-weight: bold; margin-top: 5px; font-size: 0.9em; }
        .status-offline { color: #e74c3c; }
        .status-online { color: #27ae60; }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <h1>🎱 Club Manager</h1>
    <div id="connection-status" class="cloud-status status-offline">☁️ App is Offline (Local Mode)</div>

    <div class="dashboard">
        <div class="table-card snooker-card">
            <div class="table-title">Snooker 1</div>
            <div class="rate-info">4 Rs / Min</div>
            <div class="time-inputs">
                <div class="input-row"><label>Start Time:</label><input type="time" id="start-s1"></div>
                <div class="input-row"><label>End Time:</label><input type="time" id="end-s1"></div>
            </div>
            <button class="calc
